<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tecnologias – Matheus</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/tecnologias/tecnologias.css">
</head>
<body>

  <main class="tec-container">

    <a href="index.html" class="back-btn">← Voltar</a>

    <header class="tec-header">
      <h1 class="tec-title">Tecnologias</h1>
      <p class="tec-subtitle">Ferramentas e linguagens que utilizo nos meus projetos.</p>
    </header>

    <!-- Frontend -->
    <section class="tec-section">
      <p class="tec-section__label">Frontend</p>
      <div class="tec-grid">

        <div class="tec-card tec-card--orange">
          <div class="tec-card__icon tec-card__icon--orange">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ff8c38" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="4 7 4 4 20 4 20 7"/>
              <line x1="9" y1="20" x2="15" y2="20"/>
              <line x1="12" y1="4" x2="12" y2="20"/>
            </svg>
          </div>
          <span class="tec-card__name">HTML</span>
          <span class="tec-card__level">Estrutura</span>
        </div>

        <div class="tec-card tec-card--blue">
          <div class="tec-card__icon tec-card__icon--blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="#4a8fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 2h11l5 5v15a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/>
              <path d="M9 13h6M9 17h4"/>
            </svg>
          </div>
          <span class="tec-card__name">CSS</span>
          <span class="tec-card__level">Estilização</span>
        </div>

        <div class="tec-card tec-card--orange">
          <div class="tec-card__icon tec-card__icon--orange">
            <svg viewBox="0 0 24 24" fill="none" stroke="#ff8c38" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 18 22 12 16 6"/>
              <polyline points="8 6 2 12 8 18"/>
            </svg>
          </div>
          <span class="tec-card__name">JavaScript</span>
          <span class="tec-card__level">Interatividade</span>
        </div>

      </div>
    </section>

    <!-- Ferramentas -->
    <section class="tec-section">
      <p class="tec-section__label">Ferramentas</p>
      <div class="tec-grid">

        <div class="tec-card tec-card--purple">
          <div class="tec-card__icon tec-card__icon--purple">
            <svg viewBox="0 0 24 24" fill="none" stroke="#9b59ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="18" cy="18" r="3"/>
              <circle cx="6" cy="6" r="3"/>
              <path d="M6 21V9a9 9 0 0 0 9 9"/>
            </svg>
          </div>
          <span class="tec-card__name">Git</span>
          <span class="tec-card__level">Versionamento</span>
        </div>

        <div class="tec-card tec-card--green">
          <div class="tec-card__icon tec-card__icon--green">
            <svg viewBox="0 0 24 24" fill="#3fffa2">
              <path d="M12 2C6.477 2 2 6.484 2 12.021c0 4.428 2.865 8.184 6.839 9.504.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.026 2.747-1.026.546 1.378.202 2.397.1 2.65.64.7 1.028 1.595 1.028 2.688 0 3.847-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.579.688.481C19.138 20.2 22 16.447 22 12.021 22 6.484 17.523 2 12 2z"/>
            </svg>
          </div>
          <span class="tec-card__name">GitHub</span>
          <span class="tec-card__level">Repositórios</span>
        </div>

        <div class="tec-card tec-card--blue">
          <div class="tec-card__icon tec-card__icon--blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="#4a8fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2"/>
              <line x1="8" y1="21" x2="16" y2="21"/>
              <line x1="12" y1="17" x2="12" y2="21"/>
            </svg>
          </div>
          <span class="tec-card__name">VS Code</span>
          <span class="tec-card__level">Editor</span>
        </div>

      </div>
    </section>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
